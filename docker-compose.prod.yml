# Sunucuda: .env dosyası aynı dizinde olmalı (MYSQL_* değişkenleri).
# docker compose -f docker-compose.prod.yml up -d
#
# NOT: MYSQL_USER asla "root" olamaz — resmi mysql imajı bunu reddeder ve db ayağa kalkmaz.

services:
  app:
    image: enessaid2701/enurcnc:${APP_IMAGE_TAG:-latest}
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      DB_HOSTNAME: db
      DB_USERNAME: ${MYSQL_USER:-enurcnc_user2}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE:-enurcnc_db}
    depends_on:
      db:
        condition: service_started
    restart: unless-stopped

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-enurcnc_db}
      MYSQL_USER: ${MYSQL_USER:-enurcnc_user2}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 120s
    restart: unless-stopped

volumes:
  mysql_data:
