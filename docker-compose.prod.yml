# Sunucuda sadece Docker Hub imajını kullanmak için:
# docker compose -f docker-compose.prod.yml --env-file .env up -d
#
# Bu dosya db + app'i birlikte ayağa kaldırır; app imajı registry'den çekilir.

services:
  app:
    image: enessaid2701/enurcnc:${APP_IMAGE_TAG:-latest}
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      DB_HOSTNAME: db
      DB_USERNAME: ${MYSQL_USER:-enurcnc}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE:-enurcnc_db}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-enurcnc_db}
      MYSQL_USER: ${MYSQL_USER:-enurcnc}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    restart: unless-stopped

volumes:
  mysql_data:
