# Sunucuda sadece Docker Hub imajını kullanmak için:
# docker compose -f docker-compose.prod.yml --env-file .env up -d
#
# Bu dosya db + app'i birlikte ayağa kaldırır; app imajı registry'den çekilir.

services:
  app:
    image: enessaid2701/enurcnc:${APP_IMAGE_TAG:-latest}
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      DB_HOSTNAME: db
      DB_USERNAME: root
      DB_PASSWORD: enurcnc11.
      DB_NAME: enurcnc_db
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: enurcnc11.
      MYSQL_DATABASE: enurcnc_db
      MYSQL_USER: root
      MYSQL_PASSWORD: enurcnc11.
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-penurcnc11."]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 120s
    restart: unless-stopped

volumes:
  mysql_data:
