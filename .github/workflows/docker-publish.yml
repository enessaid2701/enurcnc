name: Build, push and deploy

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

env:
  IMAGE: enessaid2701/enurcnc
  DEPLOY_PATH: /root/enurcnc

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: enessaid2701
          password: EnesSaid-2701.

      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy compose and MySQL init to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 136.144.240.159
          username: root
          password: jTsQUpMqxPRd
          port: 23422
          source: "docker-compose.prod.yml,docker/mysql"
          target: /root/enurcnc

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 136.144.240.159
          username: root
          password: jTsQUpMqxPRd
          port: 23422
          script: |
            set -e
            cd ${{ env.DEPLOY_PATH }}
            printf '%s\n' "EnesSaid-2701." | docker login --username "enessaid2701" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans
