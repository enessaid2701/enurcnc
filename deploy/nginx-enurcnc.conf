# Nginx reverse proxy — enurcnc.com
# Sunucuda: /etc/nginx/sites-available/enurcnc
# Symlink: sites-enabled/enurcnc
#
# Canonical: https://www.enurcnc.com
# - enurcnc.com (HTTP/HTTPS) -> 301 https://www...
# - IP ile HTTP -> 301 https://www... (HTTPS+IP sertifikada yok; tarayıcı uyarı verir, mümkünse domain kullanın)
#
# SSL yolları Let's Encrypt "cert-name" = enurcnc.com varsayımıyla. Farklıysa yolları güncelleyin.
# ssl_dhparam yoksa: sudo openssl dhparam -out /etc/letsencrypt/ssl-dhparams.pem 2048
# veya Certbot kurulumunuzda bu dosya zaten oluşturulmuş olabilir.

# ========== Port 80: ACME + tek canonical HTTPS'e yönlendir ==========
server {
    listen 80;
    listen [::]:80;
    server_name enurcnc.com www.enurcnc.com 136.144.240.159;

    client_max_body_size 64M;

    location /.well-known/acme-challenge/ {
        allow all;
        default_type "text/plain";
        root /var/www/html;
    }

    location / {
        return 301 https://www.enurcnc.com$request_uri;
    }
}

# ========== Port 443: kök alan -> www (aynı sertifika, SAN'da ikisi de olmalı) ==========
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name enurcnc.com;

    ssl_certificate /etc/letsencrypt/live/enurcnc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/enurcnc.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.enurcnc.com$request_uri;
}

# ========== Port 443: asıl site ==========
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.enurcnc.com;

    client_max_body_size 64M;

    ssl_certificate /etc/letsencrypt/live/enurcnc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/enurcnc.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
